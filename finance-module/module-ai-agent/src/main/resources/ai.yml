# ============================================================
# AI Agent 智能体框架配置文件
# 文件路径: module-ai-agent/src/main/resources/ai.yml
# 功能描述: 配置 AI 智能体的模型、工具、记忆、安全等相关参数
# ============================================================

# AI 智能体根配置
ai:
  # -------------------- 默认配置 --------------------
  # 默认使用的模型ID
  default-model: zhipu
  # 默认使用的 Agent 类型
  default-agent: chat

  # -------------------- 模型配置 --------------------
  # 定义可用的 LLM（大语言模型）提供商
  models:
    # 智谱 GLM 模型配置（默认模型）
    zhipu:
      # 是否启用该模型
      enabled: true
      # API 密钥
      api-key: 720078d070634df08e25c57acb005887.RguGPV6tCxt4Mmku
      # 使用的具体模型名称
      model: glm-5
      # API 服务地址
      base-url: https://open.bigmodel.cn/api/paas/v4
      # 最大输出 Token 数量
      max-tokens: 4096
      # 温度参数，范围 0-1，值越高越随机，值越低越确定
      temperature: 0.7
      # 请求超时时间（毫秒）
      timeout: 30000
      # 请求失败后的重试次数
      retry-times: 3

    # Claude 模型配置（可选，默认禁用）
    claude:
      # 是否启用该模型
      enabled: false
      # Anthropic API 密钥
      api-key: ${ANTHROPIC_API_KEY:}
      # 使用的 Claude 模型版本
      model: claude-sonnet-4-6
      # Anthropic API 服务地址
      base-url: https://api.anthropic.com
      # 最大输出 Token 数量
      max-tokens: 8192

  # -------------------- Agent 配置 --------------------
  # 定义不同类型的智能体及其行为
  agents:
    # 通用对话 Agent - 适合日常问答
    chat:
      # 使用的模型ID
      model: zhipu
      # 可用的工具列表
      tools: [search, calculator]
      # 最大上下文对话轮数，用于限制历史消息数量
      max-context-rounds: 20
      # 系统提示词，定义 Agent 的角色和行为
      system-prompt: |
        你是一个智能助手，能够帮助用户解答问题。
        请用清晰、准确的语言回答用户的问题。

    # 代码助手 Agent - 适合代码开发
    code:
      # 使用的模型ID
      model: zhipu
      # 可用的工具列表：文件读取、文件写入、代码搜索
      tools: [file_reader, file_writer, code_search]
      # 最大上下文对话轮数
      max-context-rounds: 20
      # 系统提示词
      system-prompt: |
        你是一个专业的代码助手，熟悉 Java 和 Vue 开发。
        你可以分析代码、生成代码、编写测试用例。

    # 数据分析 Agent - 适合财务数据分析
    data:
      # 使用的模型ID
      model: zhipu
      # 可用的工具列表：数据库查询、计算器、图表生成
      tools: [database_query, calculator, chart_generator]
      # 最大上下文对话轮数
      max-context-rounds: 20
      # 系统提示词
      system-prompt: |
        你是一个专业的财务数据分析助手。
        你可以查询分析财务数据、生成报表。

  # -------------------- 工具配置 --------------------
  # 定义各种工具的详细配置
  tools:
    # 文件读取工具配置
    file_reader:
      # 是否启用该工具
      enabled: true
      # 项目根目录，从环境变量读取，默认为当前目录
      project-root: ${PROJECT_ROOT:./}
      # 允许读取的文件扩展名列表
      allowed-extensions: [.java, .xml, .yml, .properties, .vue, .js, .ts, .md, .json, .xls, .xlsx]
      # 单个文件最大大小限制
      max-file-size: 1

    # 文件写入工具配置
    file_writer:
      # 是否启用该工具
      enabled: true
      # 执行前是否需要用户确认
      require-confirmation: false
      # 允许写入的目录列表，空表示不限制
      allowed-directories: []
      # 项目根目录
      project-root: ${PROJECT_ROOT:./}

  # -------------------- 记忆配置 --------------------
  # 定义 Agent 的记忆系统配置
  memory:
    # 短期记忆配置（会话上下文）
    short-term:
      # 最大保留消息数量
      max-messages: 20
      # 过期时间（分钟）
      expire-minutes: 60
    # 向量记忆配置（语义检索）
    vector:
      # 是否启用向量记忆
      enabled: true
      # 嵌入模型ID
      embedding-model: zhipu-embedding-3
      # 相似度阈值，范围 0-1，值越高要求越相似
      similarity-threshold: 0.7
      # 检索时返回的最相似结果数量
      top-k: 5
    # 上下文压缩配置
    compaction:
      # 是否启用压缩
      enabled: true
      # 压缩策略：summary 摘要压缩
      strategy: summary
      # 触发压缩的 Token 阈值
      max-tokens: 4000
      # 压缩目标比例，0.3 表示压缩到原来的 30%
      target-ratio: 0.3

  # -------------------- 安全配置 --------------------
  # 定义安全相关的配置
  security:
    # 是否启用 Prompt 注入检测
    prompt-injection-check: true
    # 是否启用敏感数据检测
    sensitive-data-check: true
    # 敏感数据类型列表
    sensitive-patterns: [phone, id_card, bank_card, email, password, api_key]
    # 请求频率限制配置
    rate-limit:
      # 是否启用限流
      enabled: true
      # 每分钟最大请求数
      requests-per-minute: 20
      # 每日最大 Token 使用量
      tokens-per-day: 100000

  # -------------------- 并发配置 --------------------
  # 定义并发处理相关配置
  concurrency:
    # 最大并发请求数
    max-requests: 3
    # 等待队列大小
    queue-size: 10
    # 请求超时时间（秒）
    timeout-seconds: 300

# ============================================================
# 环境变量配置
# 用于覆盖上述配置中的占位符 ${API.KEY.ZHIPU}
# ============================================================
API:
  KEY:
    # 智谱 GLM 模型的 API Key
    ZHIPU: 720078d070634df08e25c57acb005887.RguGPV6tCxt4Mmku
